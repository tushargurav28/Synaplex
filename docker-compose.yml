services:
  mongodb:
    image: mongo:7
    container_name: synaplex-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synaplex-backend
    restart: unless-stopped
    environment:
      PORT: 5001
      NODE_ENV: development
      CLIENT_URL: http://localhost:3000
      MONGO_DB_URI: mongodb://mongodb:27017/chat-app-db
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET before running Docker Compose}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
    ports:
      - "5001:5001"
    depends_on:
      - mongodb

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: synaplex-frontend
    restart: unless-stopped
    environment:
      VITE_API_TARGET: http://backend:5001
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongodb-data:
